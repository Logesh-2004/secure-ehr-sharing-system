name: clinician_app
description: Secure EHR clinician application for CQEP QR validation.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.25.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0

  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  local_auth: ^2.1.6
  file_picker: ^8.0.0
  crypto: ^3.0.3
  provider: ^6.1.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
